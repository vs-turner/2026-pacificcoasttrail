<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>High Sierra Thru-Hike — July 15 to Aug 14</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root{
    --bg:#0f1720; --panel:#161f2b; --panel2:#1e2a3a; --ink:#e7edf3; --muted:#9fb0c3;
    --accent:#5db3ff; --camp:#4caf78; --special:#e6a23c; --summit:#e05d5d; --road:#8a94a6;
    --border:#26344a;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink)}
  #wrap{display:flex;height:100vh;overflow:hidden}
  #sidebar{width:360px;min-width:320px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column}
  #head{padding:16px 18px;border-bottom:1px solid var(--border)}
  #head h1{margin:0 0 4px;font-size:16px;letter-spacing:.2px}
  #head p{margin:0;font-size:12px;color:var(--muted)}
  #stats{display:flex;gap:14px;margin-top:10px;font-size:11px;color:var(--muted)}
  #stats b{display:block;font-size:16px;color:var(--ink)}
  #legend{display:flex;flex-wrap:wrap;gap:8px 14px;padding:12px 18px;border-bottom:1px solid var(--border);font-size:11px;color:var(--muted)}
  #legend span{display:inline-flex;align-items:center;gap:6px}
  .dot{width:11px;height:11px;border-radius:50%;border:2px solid #fff2}
  .dot.camp{background:var(--camp)} .dot.special{background:var(--special)}
  .dot.summit{background:var(--summit)} .dot.road{background:var(--road)}
  #list{overflow-y:auto;flex:1}
  .row{padding:10px 18px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s}
  .row:hover{background:var(--panel2)}
  .row.active{background:var(--panel2);border-left:3px solid var(--accent);padding-left:15px}
  .row .d{font-size:11px;color:var(--accent);font-weight:600;margin-bottom:2px;display:flex;justify-content:space-between}
  .row .d .mi{color:var(--muted);font-weight:500}
  .row .t{font-size:13px;font-weight:600;line-height:1.3}
  .row .n{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.4}
  #map{flex:1}
  .leaflet-popup-content-wrapper{background:var(--panel2);color:var(--ink);border-radius:10px}
  .leaflet-popup-tip{background:var(--panel2)}
  .leaflet-popup-content{margin:12px 14px;font-size:12.5px;line-height:1.5}
  .leaflet-popup-content b{color:var(--accent)}
  .pin{border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 1px #0006}
  .numlbl{font-size:10px;font-weight:700;color:#fff;text-align:center;line-height:18px}
  @media(max-width:720px){#wrap{flex-direction:column}#sidebar{width:100%;min-width:0;height:44%}#map{height:56%}}
</style>
</head>
<body>
<div id="wrap">
  <div id="sidebar">
    <div id="head">
      <h1>High Sierra Thru-Hike</h1>
      <p>July 15 – August 14 · ~380 mi · SF → Whitney → JMT → N. Yosemite → SF</p>
      <div id="stats">
        <div><b>31</b>days</div>
        <div><b>2</b>resupplies</div>
        <div><b>~80,000'</b>elevation gain</div>
      </div>
    </div>
    <div id="legend">
      <span><i class="dot camp"></i>Camp / hike</span>
      <span><i class="dot special"></i>Resupply / town</span>
      <span><i class="dot summit"></i>Summit</span>
      <span><i class="dot road"></i>Road / trailhead</span>
    </div>
    <div id="list"></div>
  </div>
  <div id="map"></div>
</div>
<script>
// [day, date, lat, lon, title, type, miles, note]
const STOPS = [
 [0,"Jul 15",37.7749,-122.4194,"Leave San Francisco","road","","Pick up Abby, then drive to Cottonwood Lakes TH."],
 [0,"Jul 15",36.4522,-118.1697,"Cottonwood Lakes Trailhead","road","","Car camp overnight at the trailhead."],
 [1,"Jul 16",36.0447,-118.1265,"Kennedy Meadows South (start)","special","","Taxi from Cottonwood Lakes TH (Chuck Tello, 805-657-0021). Begin hiking north."],
 [1,"Jul 16",36.1500,-118.2050,"South Fork Kern River / Beck Meadows","camp","11–14","First camp: Beck Meadows or South Fork of the Kern River."],
 [2,"Jul 17",36.2700,-118.2050,"Gomez Meadow","camp","13–16",""],
 [3,"Jul 18",36.4000,-118.1720,"Diaz Creek","camp","~12",""],
 [4,"Jul 19",36.4522,-118.1697,"Cottonwood Lakes TH — drop Abby","road","4.5","Drop Abby off, then continue over Cottonwood Pass."],
 [4,"Jul 19",36.4636,-118.2461,"Chicken Spring Lake","camp","4.5","Over Cottonwood Pass to the lake."],
 [5,"Jul 20",36.5650,-118.3200,"Crabtree Meadow → Guitar Lake","camp","17–19","Camp between Upper Crabtree Meadow and Guitar Lake."],
 [6,"Jul 21",36.5785,-118.2920,"Mt. Whitney summit","summit","","Up at 6am, summit by 10am to beat thunderstorms. 14,505 ft!"],
 [6,"Jul 21",36.6000,-118.3550,"Sandy Meadow","camp","17–19","Hike back down, camp at Sandy Meadow."],
 [7,"Jul 22",36.6820,-118.3720,"Base of Forester Pass","camp","~13","Climb over, camp at the lake below Forester Pass (13,153 ft)."],
 [8,"Jul 23",36.7728,-118.3410,"Onion Valley Trailhead","special","15.5","Over Kearsarge Pass to the trailhead; camp near it."],
 [9,"Jul 24",36.7728,-118.3410,"Resupply #1 — Onion Valley","special","","Resupply via Mt. Williamson Motel (be at TH by 8:30am). Rest day."],
 [10,"Jul 25",36.8009,-118.4021,"Rae Lakes","camp","~12","Back over Kearsarge Pass to Rae Lakes."],
 [11,"Jul 26",36.9050,-118.4380,"Lake Marjorie","camp","~16",""],
 [12,"Jul 27",37.0900,-118.4700,"Palisade Creek × Middle Fork Kings","camp","~18",""],
 [13,"Jul 28",37.1740,-118.6800,"Evolution Lake / Darwin Meadow","camp","17–19","Evolution Valley."],
 [14,"Jul 29",37.2380,-118.8790,"Muir Trail Ranch","special","~15","Second resupply at MTR."],
 [15,"Jul 30",37.3770,-118.9850,"Lake Thomas Edison","camp","~19",""],
 [16,"Jul 31",37.4700,-118.9400,"Lake Virginia","camp","~13","Meet up with Jackson."],
 [17,"Aug 1",37.5500,-119.0300,"Iva Bell Hot Springs","camp","~10","Soak, then a few more miles before camp."],
 [18,"Aug 2",37.6136,-119.0736,"Reds Meadow Resort","special","~12","Shuttle to Mammoth; meet Roshan & Tomas. Mammoth Mountain Inn (10400 Minaret Rd). Resupply groceries."],
 [19,"Aug 3",37.6250,-119.0850,"Reds Meadow Campground / Devils Postpile","special","","Visit Devil's Postpile."],
 [20,"Aug 4",37.6800,-119.1600,"Shadow Lake","camp","~10",""],
 [21,"Aug 5",37.7700,-119.1700,"Rush Creek","camp","~10",""],
 [22,"Aug 6",37.8300,-119.2700,"Lyell Fork (below Donahue Pass)","camp","~6.5","Summit Donahue Pass (11,073 ft), down to Lyell Fork."],
 [23,"Aug 7",37.8730,-119.3510,"Tuolumne Meadows Campground","special","~10","Enter Yosemite! Meet SF friends."],
 [24,"Aug 8",37.9100,-119.4170,"Glen Aulin (day hike)","camp","13 rt","Day hike to Glen Aulin — slide down the waterfall!"],
 [25,"Aug 9",37.9100,-119.4170,"Glen Aulin","camp","~6","Friends head home; continue north."],
 [26,"Aug 10",37.9800,-119.4500,"Wilson Creek (base of Benson Pass)","camp","~16",""],
 [27,"Aug 11",38.0500,-119.5500,"Rancheria Creek, Kerrick Canyon","camp","~14.5",""],
 [28,"Aug 12",38.1000,-119.6000,"Falls Creek / Grace Meadow","camp","~15","Past Tilden Lake."],
 [29,"Aug 13",38.2000,-119.6200,"Kennedy Canyon","camp","~12",""],
 [30,"Aug 14",38.3216,-119.7444,"Kennedy Meadows North (finish)","special","13.5","Hitchhike to Sonora, then transit back to San Francisco."],
];

const map = L.map('map',{zoomControl:true}).setView([37.2,-118.7],7);
const topo = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',{
  maxZoom:17, attribution:'© OpenTopoMap, © OpenStreetMap contributors'});
const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  maxZoom:19, attribution:'© OpenStreetMap contributors'});
topo.addTo(map);
L.control.layers({"Topographic":topo,"Street":osm}).addTo(map);

const colors={camp:'#4caf78',special:'#e6a23c',summit:'#e05d5d',road:'#8a94a6'};
const latlngs = STOPS.map(s=>[s[2],s[3]]);
L.polyline(latlngs,{color:'#5db3ff',weight:3,opacity:.75,dashArray:'1,0'}).addTo(map);

const markers=[];
STOPS.forEach((s,i)=>{
  const [day,date,lat,lon,title,type,miles,note]=s;
  const size = type==='summit'?26:22;
  const icon = L.divIcon({className:'',iconSize:[size,size],iconAnchor:[size/2,size/2],
    html:`<div class="pin" style="width:${size}px;height:${size}px;background:${colors[type]}">`+
         `<div class="numlbl" style="line-height:${size-4}px">${day}</div></div>`});
  const m = L.marker([lat,lon],{icon}).addTo(map);
  m.bindPopup(`<b>Day ${day} · ${date}</b><br><b style="color:#fff">${title}</b>`+
    (miles?`<br>${miles} mi`:``)+(note?`<br>${note}`:``));
  markers.push(m);
});

// sidebar
const list=document.getElementById('list');
STOPS.forEach((s,i)=>{
  const [day,date,lat,lon,title,type,miles,note]=s;
  const row=document.createElement('div');
  row.className='row';
  row.innerHTML=`<div class="d"><span>Day ${day} · ${date}</span>${miles?`<span class="mi">${miles} mi</span>`:``}</div>`+
    `<div class="t">${title}</div>`+(note?`<div class="n">${note}</div>`:``);
  row.onclick=()=>{
    document.querySelectorAll('.row').forEach(r=>r.classList.remove('active'));
    row.classList.add('active');
    map.flyTo([lat,lon],type==='summit'||type==='camp'?12:11,{duration:.8});
    markers[i].openPopup();
  };
  list.appendChild(row);
});

map.fitBounds(L.latLngBounds(latlngs).pad(0.08));
</script>
</body>
</html>
